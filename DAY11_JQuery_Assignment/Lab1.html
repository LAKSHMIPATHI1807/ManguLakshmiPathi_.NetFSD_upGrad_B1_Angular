<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="text/javascript">
        $(document).ready(() => {
            $('p').css("color", "blue");
            $("#p2").css("background-color", "yellow");
            $(".p3").css("border", "5px solid green");
            $("li:first").css({
                "color": "green",
                "background-color": "aqua",
                "padding": "10px"
            });
            $("li:last").css({
                "color": "red",
                "background-color": "black",
                "padding": "10px"
            });
        })
        $(document).ready(() => {
            $("#btn1").click(function () {
                $("tr:even").hide();
            });
        })
        $(document).ready(() => {
            $("#btn2").click(function () {
                $("tr:odd").hide();
            })
        })
        $(document).ready(() => {
            $("#btn").click(function () {
                $("tr").show();
            })
        })
    </script>
</head>
<body>
    <p>This is Paragraph 1.</p>
    <p id="p2">This is Paragraph 2.</p>
    <p class="p3">This is Paragraph 3.</p>

    <ul>
        <li>Home</li>
        <li>About</li>
        <li>Contact</li>
    </ul>

    <table border="1" cellpadding="10px">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>City</th>
        </tr>
        <tr>
            <td>01</td>
            <td>Lucky</td>
            <td>Hyd</td>
        </tr>
        <tr>
            <td>18</td>
            <td>MLP</td>
            <td>HYD</td>
        </tr>
        <tr>
            <td>07</td>
            <td>AN</td>
            <td>HYD</td>
        </tr>
        <tr>
            <td>02</td>
            <td>Lucky</td>
            <td>Hyd</td>
        </tr>
        <tr>
            <td>28</td>
            <td>MLP</td>
            <td>HYD</td>
        </tr><tr>
            <td>11</td>
            <td>Lucky</td>
            <td>Hyd</td>
        </tr>
        <tr>
            <td>38</td>
            <td>MLP</td>
            <td>HYD</td>
        </tr>
    </table>
    <br><br>
    <button id="btn1" type="submit">Hide all even rows in a table.</button>
    <button id="btn2" type="submit">Hide all odd rows in a table.</button> <br><br>
    <button id="btn" type="submit">Show all rows in a table.</button>
</body>
</html>
